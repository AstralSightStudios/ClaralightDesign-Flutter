name: claralight_ui
description: "A new Flutter package project."
version: 0.0.1
homepage:

environment:
  sdk: ^3.11.5
  flutter: ">=3.30.0"

dependencies:
  flutter:
    sdk: flutter
  progressive_blur: ^0.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # Claralight bundles its design fonts. See fonts/FONTS.md for sources
  # and licenses. All three are free for commercial use.
  fonts:
    # Variable font; the wght axis is driven via TextStyle.fontVariations
    # (see CLTypography.miSansWght — MiSans VF uses a non-standard axis).
    - family: MiSans
      fonts:
        - asset: fonts/MiSansVF.ttf
    - family: Sarasa Mono SC
      fonts:
        - asset: fonts/SarasaMonoSC-Regular.ttf
          weight: 400
        - asset: fonts/SarasaMonoSC-SemiBold.ttf
          weight: 600
    - family: ChillDINGothic
      fonts:
        - asset: fonts/ChillDINGothic_Bold.otf
          weight: 700
